<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OTZ 司機端</title><body><h1>OTZ 司機端</h1><input id="t" type="password" placeholder="司機密碼"><button onclick="load()">登入</button><div id="o"></div><script>async function load(){const r=await fetch('/api/driver/orders',{headers:{'x-driver-token':t.value}});const d=await r.json();o.innerHTML=Array.isArray(d)?d.map(x=>`<p>OTZ-${String(x.id).padStart(6,'0')} ${x.pickup}→${x.destination} <button onclick="claim(${x.id})">接單</button></p>`).join(''):JSON.stringify(d)}async function claim(id){await fetch('/api/driver/orders/'+id+'/claim',{method:'POST',headers:{'x-driver-token':t.value}});load()}</script>
