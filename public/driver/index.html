<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OTZ 司機端</title>
<style>
body{font-family:system-ui;margin:0;background:#f4f4f4}header{background:#111;color:#d4af37;padding:18px;font-size:22px;font-weight:700}
main{max-width:760px;margin:auto;padding:16px}.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
input,button{padding:10px;border-radius:8px;border:1px solid #ccc;font:inherit}button{background:#111;color:white}
</style>
</head>
<body>
<header>OTZ 司機端</header>
<main>
<div class="card">
<input id="token" type="password" placeholder="司機密碼">
<button onclick="loadOrders()">登入／更新</button>
</div>
<div id="list"></div>
</main>
<script>
let token=localStorage.getItem("otzDriver")||"";
document.getElementById("token").value=token;

async function loadOrders(){
  token=document.getElementById("token").value.trim();
  localStorage.setItem("otzDriver",token);
  const r=await fetch("/api/driver/orders",{headers:{"x-driver-token":token}});
  const d=await r.json();
  if(!r.ok){alert(d.error||"登入失敗");return}
  list.innerHTML=d.map(o=>`<div class="card">
    <b>OTZ-${String(o.id).padStart(6,"0")}</b><br>
    ${o.pickup} → ${o.destination}<br>
    ${o.ride_time||"未提供"}｜${o.estimated_fare||0} 元<br><br>
    ${o.status==="pending"?`<button onclick="claim(${o.id})">我要接單</button>`:"已接單"}
    <button onclick="nav('${encodeURIComponent(o.pickup)}')">導航</button>
  </div>`).join("");
}

async function claim(id){
  const r=await fetch(`/api/driver/orders/${id}/claim`,{method:"POST",headers:{"x-driver-token":token}});
  const d=await r.json();
  if(!r.ok){alert(d.error||"接單失敗");return}
  loadOrders();
}

function nav(place){
  window.open(`https://www.google.com/maps/search/?api=1&query=${place}`,"_blank");
}
</script>
</body>
</html>
