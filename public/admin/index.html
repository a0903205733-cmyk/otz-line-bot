<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OTZ 管理後台</title><body><h1>OTZ 管理後台</h1><input id="t" type="password" placeholder="管理密碼"><button onclick="load()">登入</button><pre id="o"></pre><script>async function load(){const r=await fetch('/api/admin/orders',{headers:{'x-admin-token':t.value}});o.textContent=JSON.stringify(await r.json(),null,2)}</script>
